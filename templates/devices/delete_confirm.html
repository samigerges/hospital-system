 <!-- templates/devices/delete_confirm.html -->
{% extends 'base.html' %}

{% block title %}Confirm Deletion{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirm Deletion</h4>
            </div>
            <div class="card-body text-center py-5">
                <i class="bi bi-trash fs-1 text-danger mb-4"></i>
                <h4>Are you sure you want to delete this device?</h4>
                <p class="text-muted mb-4">This action cannot be undone</p>
                
                <div class="alert alert-warning">
                    <i class="bi bi-info-circle"></i>
                    Device: <strong>{{ device.name }}</strong><br>
                    ID: <strong>{{ device.device_id }}</strong>
                </div>
                
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-lg">
                        <i class="bi bi-check-circle"></i> Yes, Delete
                    </button>
                </form>
                <a href="{% url 'device_list' %}" class="btn btn-secondary btn-lg">
                    <i class="bi bi-x-circle"></i> Cancel
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
